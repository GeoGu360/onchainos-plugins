schema_version: 1
name: curve
version: "0.1.0"
description: "Curve DEX plugin — swap stablecoins, add/remove liquidity, query pools and APY across Ethereum, Arbitrum, Base, Polygon, and BSC."
author:
  name: skylavis-sky
  github: skylavis-sky
category: defi-protocol
tags:
  - dex
  - swap
  - stablecoin
  - amm
  - liquidity
license: MIT

components:
  skill:
    dir: skills/curve

build:
  lang: rust
  binary_name: curve
  source_repo: GeoGu360/onchainos-plugins
  source_commit: "a98284d"
  source_dir: curve

api_calls:
  - "https://api.curve.finance/api/getPools"
  - "https://ethereum.publicnode.com"
  - "https://arb1.arbitrum.io/rpc"
  - "https://base-rpc.publicnode.com"
  - "https://polygon-rpc.com"
  - "https://bsc-rpc.publicnode.com"
